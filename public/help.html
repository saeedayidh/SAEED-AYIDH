<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مركز المساعدة | سعيد سنترهلب</title>
<link rel="icon" href="/assets/logo.png">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- خلفية الأورورا -->
<div class="aurora" aria-hidden="true">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
</div>
<div class="noise" aria-hidden="true"></div>
<div class="vignette" aria-hidden="true"></div>

<div id="progress"></div>
<div class="cursor-dot" aria-hidden="true"></div>
<div class="cursor-ring" aria-hidden="true"></div>

<!-- شريط التنقل -->
<nav id="nav">
  <div class="nav-in">
    <a href="/" class="nav-logo">
      <img src="/assets/logo.png" id="logoImg" alt="logo">
      <span id="siteName"></span>
    </a>
    <div class="nav-links" id="navLinks">
      <a href="/" data-i18n="help_back"></a>
    </div>
    <div class="nav-actions">
      <button class="icon-btn" id="themeBtn" title="theme">🌗</button>
      <button class="icon-btn" id="langBtn">EN</button>
    </div>
  </div>
</nav>

<!-- رأس الصفحة -->
<section class="help-hero">
  <div class="wrap">
    <span class="eyebrow" data-i18n="eyebrow_support"></span>
    <h1 id="helpTitle"></h1>
    <p data-i18n="support_desc"></p>
    <div class="help-search">
      <input type="text" id="helpSearch" data-i18n-placeholder="help_search_placeholder">
    </div>
  </div>
</section>

<section>
  <div class="wrap">
    <div class="faq-list" id="helpList"></div>
  </div>
</section>

<!-- الفوتر -->
<footer>
  <div class="wrap">
    <div class="foot-grid">
      <div class="foot-brand">
        <img src="/assets/logo.png" id="footLogo" alt="logo">
        <span id="footerName"></span>
      </div>
      <div class="foot-links">
        <a href="/" data-i18n="nav_home"></a>
      </div>
    </div>
    <div class="foot-bottom">
      <p class="copy"><span id="footerYear"></span> © <span id="footerName2"></span> — <span data-i18n="footer_rights"></span></p>
      <div class="foot-pages" id="footerPages"></div>
    </div>
  </div>
</footer>

<button id="toTop" aria-label="top">
  <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
</button>

<script src="/js/i18n.js"></script>
<script src="/js/icons.js"></script>
<script>
let HELP_DATA = null;

function applyTheme() {
  document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');
}
function applyLang() {
  const lang = currentLang();
  document.documentElement.setAttribute('lang', lang);
  document.documentElement.setAttribute('dir', I18N[lang].dir);
  document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = t(el.getAttribute('data-i18n')));
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => el.placeholder = t(el.getAttribute('data-i18n-placeholder')));
  document.getElementById('langBtn').textContent = t('lang_toggle');
}
function L(field) {
  if (!field) return '';
  const lang = currentLang();
  return field[lang] || field.ar || field.en || '';
}

function renderHelp(filter) {
  const list = document.getElementById('helpList');
  list.innerHTML = '';
  const items = HELP_DATA.faq.filter(item => {
    if (!filter) return true;
    const q = (L(item.question) + ' ' + L(item.answer)).toLowerCase();
    return q.includes(filter.toLowerCase());
  });
  if (!items.length) {
    list.innerHTML = `<div class="empty-state">${t('faq_empty')}</div>`;
    return;
  }
  items.forEach(item => {
    const el = document.createElement('div');
    el.className = 'faq-item';
    el.innerHTML = `
      <div class="faq-q"><span>${L(item.question)}</span><span class="chev">⌄</span></div>
      <div class="faq-a"><p>${L(item.answer)}</p></div>`;
    el.querySelector('.faq-q').addEventListener('click', () => el.classList.toggle('open'));
    list.appendChild(el);
  });
}

// مؤشر مخصص + شريط تقدم + حالة التمرير لشريط التنقل + زر العودة للأعلى
function setupCursor() {
  const dot = document.querySelector('.cursor-dot');
  const ring = document.querySelector('.cursor-ring');
  if (!dot || !ring) return;
  let active = false;
  window.addEventListener('pointermove', (e) => {
    if (e.pointerType && e.pointerType !== 'mouse') return;
    if (!active) { active = true; document.body.classList.add('has-cursor'); }
    dot.style.transform = `translate(${e.clientX}px, ${e.clientY}px) translate(-50%,-50%)`;
    ring.style.transform = `translate(${e.clientX}px, ${e.clientY}px) translate(-50%,-50%)`;
  });
  document.addEventListener('pointerover', (e) => {
    if (e.target.closest && e.target.closest('a, button, .faq-q, input')) ring.classList.add('big');
  });
  document.addEventListener('pointerout', (e) => {
    if (e.target.closest && e.target.closest('a, button, .faq-q, input')) ring.classList.remove('big');
  });
}
function setupScrollEffects() {
  const progress = document.getElementById('progress');
  const nav = document.getElementById('nav');
  const toTop = document.getElementById('toTop');
  function onScroll() {
    const max = document.documentElement.scrollHeight - window.innerHeight;
    const pct = max > 0 ? (window.scrollY / max) * 100 : 0;
    if (progress) progress.style.width = pct + '%';
    if (nav) nav.classList.toggle('scrolled', window.scrollY > 30);
    if (toTop) toTop.classList.toggle('show', window.scrollY > 500);
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll();
  if (toTop) toTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
}

async function init() {
  applyTheme();
  applyLang();
  setupCursor();
  setupScrollEffects();
  document.getElementById('themeBtn').addEventListener('click', () => {
    const cur = localStorage.getItem('theme') || 'dark';
    localStorage.setItem('theme', cur === 'dark' ? 'light' : 'dark');
    applyTheme();
  });
  document.getElementById('langBtn').addEventListener('click', () => {
    const cur = currentLang();
    localStorage.setItem('lang', cur === 'ar' ? 'en' : 'ar');
    applyLang();
    render();
  });

  const [helpRes, dataRes] = await Promise.all([fetch('/api/help'), fetch('/api/data')]);
  HELP_DATA = await helpRes.json();
  const siteData = await dataRes.json();
  window.SITE_SETTINGS = siteData.settings;
  window.FULL_DATA = siteData;
  render();

  document.getElementById('helpSearch').addEventListener('input', (e) => renderHelp(e.target.value));
}

function renderFooterPages(data) {
  const container = document.getElementById('footerPages');
  if (!container) return;
  container.innerHTML = '';
  (data.footerPages || []).forEach(fp => {
    const a = document.createElement('a');
    a.href = `/p/${fp.slug}`;
    a.textContent = L(fp.name);
    container.appendChild(a);
  });
}

function render() {
  const s = window.SITE_SETTINGS;
  document.getElementById('siteName').textContent = L(s.siteName);
  document.getElementById('footerName').textContent = L(s.siteName);
  document.getElementById('footerName2').textContent = L(s.siteName);
  document.getElementById('footerYear').textContent = new Date().getFullYear();
  if (s.logo) {
    document.getElementById('logoImg').src = s.logo;
    document.getElementById('footLogo').src = s.logo;
  }
  document.getElementById('helpTitle').textContent = L(HELP_DATA.helpCenterName) || t('help_title');
  renderHelp(document.getElementById('helpSearch').value);
  renderFooterPages(window.FULL_DATA || {});
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
